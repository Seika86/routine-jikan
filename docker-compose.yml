services:
  api:
    build: ./packages/api
    ports:
      - "3001:3001"
    volumes:
      - ./packages/api/src:/app/src
      - ./packages/api/drizzle:/app/drizzle
      - api-data:/app/data
    environment:
      - NODE_ENV=development
      - DB_PATH=file:./data/routine-jikan.db
    init: true
    restart: unless-stopped

  web:
    build: ./packages/web
    ports:
      - "3000:3000"
    volumes:
      - ./packages/web/src:/app/src
      - ./packages/web/vite.config.ts:/app/vite.config.ts
      - ./packages/shared:/app/shared
    environment:
      - NODE_ENV=development
    init: true
    restart: unless-stopped
    depends_on:
      - api

volumes:
  api-data:
